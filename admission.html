<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission - ESA</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in{
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px)}
      to{opacity:1; transform:translateY(0)}
    }

    .hover-input:focus{
      outline: none;
      border-color: #134c73;
      box-shadow: 0 0 0 2px rgba(19,76,115,0.2);
    }
  </style>
</head>

<body class="bg-white text-black">

<!-- Navbar -->
<header class="sticky top-0 bg-white shadow z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="font-bold text-xl" style="color:#134c73">
      Elementary Science Academy
    </h1>
    <nav class="hidden md:flex gap-6">
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="admission.html" class="font-bold">Admission</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="text-center py-16 fade-in">
  <h2 class="text-4xl md:text-5xl font-bold mb-4">
    Admission Form
  </h2>
  <p class="text-gray-600">
    Fill your details and start your journey with ESA
  </p>
</section>

<!-- FORM -->
<section class="max-w-3xl mx-auto px-6 pb-16">

  <form class="bg-gray-100 p-6 rounded-xl shadow space-y-5">

    <!-- Name -->
    <div>
      <label class="font-semibold">Student Name</label>
      <input type="text" placeholder="Enter your name"
        class="w-full p-3 border rounded hover-input">
    </div>

    <!-- Phone -->
    <div>
      <label class="font-semibold">Phone Number</label>
      <input type="tel" placeholder="Enter phone number"
        class="w-full p-3 border rounded hover-input">
    </div>

    <!-- Class -->
    <div>
      <label class="font-semibold">Class</label>
      <select class="w-full p-3 border rounded hover-input">
        <option>Select Class</option>
        <option>9th</option>
        <option>10th</option>
        <option>11th</option>
        <option>12th</option>
      </select>
    </div>

    <!-- Course -->
    <div>
      <label class="font-semibold">Course</label>
      <select class="w-full p-3 border rounded hover-input">
        <option>Select Course</option>
        <option>JEE</option>
        <option>NEET</option>
        <option>Olympiad</option>
        <option>RBSE</option>
        <option>CBSE</option>
        <option>CUET</option>
      </select>
    </div>

    <!-- School -->
    <div>
      <label class="font-semibold">School Name</label>
      <input type="text" placeholder="Enter school name"
        class="w-full p-3 border rounded hover-input">
    </div>

    <!-- Button -->
    <button
      class="w-full bg-yellow-400 p-3 rounded font-bold hover:opacity-90 transition">
      Submit Application
    </button>

  </form>

</section>

<!-- FOOTER -->
<footer class="bg-black text-white py-10 text-center">
  <p>Tonk, Rajasthan</p>
  <p>9079205366 | 8905220266</p>
</footer>

</body>
</html>
